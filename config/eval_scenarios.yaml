# Eval scenario corpus for the GAIA-style eval harness (B-060).
#
# 12 scenarios: office tools (Phase 1 file-cowork) + adversarial (Phase 0 guards)
# + multi-turn retention. Designed to be run twice (guards on/off) to measure
# whether B-055 (result-dedup) and B-056 (planning-text) guards improve outcomes
# on local LLMs.
#
# Binary fixtures (xlsx/csv) are referenced via copy_from_corpus and expected to
# live in config/eval/corpus/<source>. Ship minimal fixtures inline as text
# (csv) where possible; xlsx fixtures are created by a fixtures generator.
#
# expected_answer semantics (judge_turn.md):
#   - string: ground truth to match (zero-rules apply: wrong number, wrong name,
#     lazy refusal, hallucinated source → correctness=0)
#   - null:   asserts NO answer exists in the source; agent should say "don't
#     know" (correctness up to 10); inventing an answer = 0.

scenarios:
  # ───────────────────────── Office tools (Phase 1 file-cowork) ──────────────

  - id: csv_aggregate_total
    category: office_aggregation
    severity: normal
    description: >
      Aggregate a CSV via table_query. The file is too large to read verbatim,
      so the agent must use SQL aggregation, not read_file + eyeballing.
    setup:
      files:
        - path: "sales_q1.csv"
          content: |
            region,product,units,revenue
            North,Widget,10,500
            South,Widget,7,350
            North,Gadget,3,900
            South,Gadget,5,1500
            East,Widget,8,400
    turns:
      - user_message: "Посчитай общий доход (revenue) по файлу sales_q1.csv и назови число."
        expected_answer: "3650"
        expected_tools: ["dispatch_subagent"]
        expected_subagent: "data-agent"
        success_criteria: "Agent must delegate to data-agent; the subagent aggregates via SQL, not read_file the whole CSV."

  - id: csv_top_performer
    category: office_aggregation
    severity: normal
    description: Top performer by revenue requires SQL ordering, not manual scan.
    setup:
      files:
        - path: "sales_q1.csv"
          content: |
            region,product,units,revenue
            North,Widget,10,500
            South,Widget,7,350
            North,Gadget,3,900
            South,Gadget,5,1500
            East,Widget,8,400
    turns:
      - user_message: "Какой регион показал наибольшую выручку (revenue) в sales_q1.csv?"
        expected_answer: "South"
        expected_tools: ["dispatch_subagent"]
        expected_subagent: "data-agent"

  - id: csv_convert_format
    category: office_convert
    severity: normal
    description: Convert CSV to a different format via convert_format.
    setup:
      files:
        - path: "contacts.csv"
          content: |
            name,email,phone
            Alice,alice@example.com,555-0100
            Bob,bob@example.com,555-0200
    turns:
      - user_message: "Конвертируй contacts.csv в JSON и сохрани как contacts.json."
        expected_tools: ["dispatch_subagent"]
        expected_subagent: "data-agent"
        success_criteria: "contacts.json must exist and be valid JSON with both records."

  - id: multi_file_read_combine
    category: office_multistep
    severity: normal
    description: Read two files, combine into a summary. Tests multi-step tool use.
    setup:
      files:
        - path: "q1_report.txt"
          content: "Q1 revenue: 12000. Q1 expenses: 8000."
        - path: "q2_report.txt"
          content: "Q2 revenue: 15000. Q2 expenses: 9500."
    turns:
      - user_message: "Прочитай q1_report.txt и q2_report.txt и назови общую выручку за два квартала."
        expected_answer: "27000"
        expected_tools: ["read_file"]
        success_criteria: "Agent must read both files and sum the revenue figures."

  - id: write_file_tracked
    category: office_write
    severity: normal
    description: >
      Write a new file. Verifies Phase 1 file-tracking records the op as 'create'
      and the file appears in recent_files context on a subsequent turn.
    turns:
      - user_message: "Создай файл todo.txt с содержимым: 'Review Q3 budget'."
        expected_tools: ["dispatch_subagent"]
        expected_subagent: "filesystem-agent"
        success_criteria: "todo.txt must exist with the exact content."

  - id: normalize_excel_structure
    category: office_normalize
    severity: normal
    description: >
      Normalize an Excel workbook structure (headers, trim whitespace). Requires
      excel_workbook to inspect then normalize_excel to fix. Binary fixture.
    setup:
      copy_from_corpus:
        - dest: "messy.xlsx"
          source: "messy_headers.xlsx"
    turns:
      - user_message: "В файле messy.xlsx почищай заголовки: убери лишние пробелы и приведи к нижнему регистру. Сохрани результат."
        expected_tools: ["dispatch_subagent"]
        expected_subagent: "document-agent"
        success_criteria: "Normalized workbook must exist with clean lowercase headers."

  # ───────────────────────── Adversarial (Phase 0 guards) ─────────────────────

  - id: null_answer_not_in_document
    category: adversarial_null_answer
    severity: adversarial
    description: >
      The asked-for fact does NOT exist in the source. The agent must say it
      doesn't know rather than invent. Tests the hallucinated-source zero-rule.
    setup:
      files:
        - path: "policy.txt"
          content: |
            Отпуск: 28 календарных дней в год.
            Больничный: оплачивается до 5 дней без справки.
            Командировки: компенсация проживания до 5000/сутки.
    turns:
      - user_message: "Сколько дней дополнительного отпуска положено за стаж 10 лет согласно policy.txt?"
        expected_answer: null
        success_criteria: >
          FAIL if the agent invents a number. PASS if the agent states the
          document does not specify this. expected_answer is null by design.

  - id: negation_policy_must_respect
    category: adversarial_negation
    severity: adversarial
    description: >
      The policy explicitly states something is NOT allowed. The agent must not
      ignore the negation. Tests wrong-answer detection.
    setup:
      files:
        - path: "policy.txt"
          content: |
            Компенсация питания: предоставляется сотрудникам офиса.
            Удалённым сотрудникам компенсация питания НЕ предоставляется.
            Проезд: компенсируется всем сотрудникам до 2000/мес.
    turns:
      - user_message: "Положена ли компенсация питания удалённому сотруднику согласно policy.txt?"
        expected_answer: "нет"
        success_criteria: "Agent must respect the explicit negation, not default to 'yes'."

  - id: buried_fact_navigation
    category: adversarial_buried_fact
    severity: adversarial
    description: >
      The fact is buried in a later section of a long document. The agent must
      read/navigate to it rather than guessing from the opening. Tests lazy
      refusal and tool_selection.
    setup:
      files:
        - path: "manual.md"
          content: |
            # Справочник по системе

            ## Раздел 1. Введение
            Добро пожаловать. Это общий обзор.

            ## Раздел 2. Установка
            Стандартная процедура установки.

            ## Раздел 3. Настройка
            Базовые параметры конфигурации.

            ...

            ## Раздел 52. Ограничения
            Максимальный размер загружаемого файла — 48 МБ.
            Пароль должен быть не короче 14 символов.
    turns:
      - user_message: "Какой максимальный размер загружаемого файла указан в manual.md (Раздел 52)?"
        expected_answer: "48"
        expected_tools: ["read_file"]
        success_criteria: "Agent must find the Section 52 limit, not guess from the intro."

  - id: csv_loop_pressure_dedup
    category: adversarial_loop_pressure
    severity: adversarial
    description: >
      A large-ish CSV that tempts repeated list_file/read_file calls. Tests
      whether B-055 result-dedup catches the agent re-reading the same file.
      With guards ON, the loop should terminate faster.
    setup:
      files:
        - path: "big_inventory.csv"
          content: |
            sku,name,qty,warehouse
            A001,Widget,142,North
            A002,Gadget,87,North
            A003,Sprocket,203,South
            A004,Gizmo,56,South
            A005,Doohickey,318,East
            A006,Thingamajig,91,East
            A007,Whatchamacallit,44,West
            A008,Whosiwhatsit,177,West
    turns:
      - user_message: "Сколько всего позиций (sku) в файле big_inventory.csv?"
        expected_answer: "8"
        expected_tools: ["dispatch_subagent"]
        expected_subagent: "data-agent"
        success_criteria: >
          FAIL if the agent calls read_file/list_file 3+ times with identical
          results (the B-055 dedup trigger condition). With guards OFF this
          scenario is expected to loop more often.

  # ──────────────────────── Multi-turn retention ─────────────────────────────

  - id: multi_turn_yoy_then_q4
    category: multi_turn_retention
    severity: normal
    description: >
      Turn 1 establishes a computed value (YoY). Turn 2 asks a follow-up that
      requires remembering the Turn 1 result. Tests context_retention dimension.
    setup:
      files:
        - path: "financials.txt"
          content: |
            2023 revenue: 100000
            2024 revenue: 120000
            Q4 2024 revenue: 35000
    turns:
      - user_message: "Какой рост выручки (в процентах) год к году по financials.txt за 2024?"
        expected_answer: "20"
        expected_tools: ["read_file"]
      - user_message: "А сколько составила выручка в Q4 того же года?"
        expected_answer: "35000"
        success_criteria: >
          Agent must answer Turn 2 without re-reading the file (context_retention).
          Cap context_retention at 4 if it re-reads established info.

  - id: multi_turn_persona_accumulation
    category: multi_turn_retention
    severity: normal
    description: >
      Across turns the agent accumulates user-stated facts. Final turn asks it to
      recall all of them. Tests memory/context retention without a file.
    turns:
      - user_message: "Запомни: меня зовут Анна, я работаю в отделе маркетинга."
        success_criteria: "Agent should acknowledge."
      - user_message: "Также запомни: мой приоритет — автоматизация отчётов по Excel."
        success_criteria: "Agent should acknowledge."
      - user_message: "Напомни, как меня зовут, в каком я отделе и какой у меня приоритет?"
        expected_answer: "Анна"
        must_contain: "маркетинг"
        success_criteria: >
          Agent must recall name (Анна), department (маркетинг) and priority
          (Excel/automation). context_retention scored on completeness.

  # ─────────────── Loop-pressure scenarios (exercise B-055 dedup) ────────────
  # These intentionally tempt the model to re-call the same tool with identical
  # or near-identical arguments. With B-055 ON, the dedup guard should catch
  # the repeat and push the model toward an answer; OFF, the loop runs longer.

  - id: large_csv_double_query
    category: loop_pressure
    severity: adversarial
    description: >
      A 30-row CSV. The question asks for a total; a weak model may call
      table_query, get a result, then re-call table_query (same or equivalent
      query) before answering. B-055 should catch the repeated result.
    setup:
      files:
        - path: "inventory.csv"
          content: |
            sku,name,qty,warehouse
            A001,Widget,142,North
            A002,Gadget,87,North
            A003,Sprocket,203,South
            A004,Gizmo,56,South
            A005,Doohickey,318,East
            A006,Thingamajig,91,East
            A007,Whatchamacallit,44,West
            A008,Whosiwhatsit,177,West
            A009,Contraption,65,North
            A010,Apparatus,112,South
            A011,Widget,98,East
            A012,Gadget,150,West
            A013,Sprocket,39,North
            A014,Gizmo,204,South
            A015,Doohickey,17,East
            A016,Thingamajig,88,West
            A017,Whatchamacallit,301,North
            A018,Whosiwhatsit,46,South
            A019,Contraption,73,East
            A020,Apparatus,159,West
            A021,Widget,51,North
            A022,Gadget,196,South
            A023,Sprocket,84,East
            A024,Gizmo,27,West
            A025,Doohickey,143,North
            A026,Thingamajig,79,South
            A027,Whatchamacallit,212,East
            A028,Whosiwhatsit,38,West
            A029,Contraption,167,North
            A030,Apparatus,95,South
    turns:
      - user_message: "Посчитай суммарное количество единиц (qty) по всем позициям в inventory.csv и назови число."
        expected_answer: "3418"
        expected_tools: ["dispatch_subagent"]
        expected_subagent: "data-agent"
        success_criteria: >
          FAIL efficiency if the agent (or its data-agent) calls table_query
          (or read_file) 3+ times with identical results (the B-055 dedup
          trigger condition).

  - id: multi_metric_same_table
    category: loop_pressure
    severity: adversarial
    description: >
      Two metrics from the same small table. A weak model may issue a separate
      query per metric even when one suffices, or re-query the table. B-055
      dedup should fire if the second query returns the same result.
    setup:
      files:
        - path: "sales.csv"
          content: |
            region,q1,q2
            North,100,150
            South,80,120
            East,60,90
            West,110,140
    turns:
      - user_message: "По файлу sales.csv: назови сумму всех значений q1 и сумму всех значений q2 (два числа)."
        expected_answer: "350"
        must_contain: "500"
        expected_tools: ["dispatch_subagent"]
        expected_subagent: "data-agent"
        success_criteria: >
          FAIL efficiency if the agent (or its data-agent) calls table_query 3+
          times on the same table with overlapping queries. Two separate
          single-purpose queries are acceptable; a loop is not.

  - id: verbose_planning_pressure
    category: planning_text_pressure
    severity: adversarial
    description: >
      An open-ended analytical question. Weak local models often answer with a
      statement of intent ("Let me now analyse the data...") instead of taking
      action or giving the answer. B-056 planning-text guard should catch that
      and push the model to act.
    setup:
      files:
        - path: "report.txt"
          content: |
            Выручка Q1: 120000. Расходы Q1: 80000.
            Выручка Q2: 150000. Расходы Q2: 95000.
            Выручка Q3: 130000. Расходы Q3: 78000.
    turns:
      - user_message: "Проанализируй report.txt: назови квартал с наибольшей чистой прибылью (выручка минус расходы) и саму эту прибыль числом."
        expected_answer: "55000"
        expected_tools: ["read_file"]
        success_criteria: >
          FAIL if the agent's first answer is a planning statement
          ("сейчас я проанализирую...", "давайте я проверю...") instead of the
          computed figure. This is the B-056 trigger condition.

  - id: buried_multi_field
    category: loop_pressure
    severity: adversarial
    description: >
      A fact buried among similar-looking fields. The model must not re-scan
      the whole file repeatedly; one read + answer suffices. Re-reads trigger
      B-055 (identical result from read_file).
    setup:
      files:
        - path: "ledger.txt"
          content: |
            2024-01-15 invoice #1042 client Acme amount 4200
            2024-01-22 invoice #1043 client Globex amount 1800
            2024-02-03 invoice #1044 client Acme amount 3600
            2024-02-19 invoice #1045 client Initech amount 5200
            2024-03-07 invoice #1046 client Acme amount 2900
            2024-03-21 invoice #1047 client Globex amount 6100
            2024-04-02 invoice #1048 client Initech amount 3400
            2024-04-18 invoice #1049 client Acme amount 4700
    turns:
      - user_message: "Прочитай ledger.txt и назови сумму всех счетов клиента Acme."
        expected_answer: "15400"
        expected_tools: ["read_file"]
        success_criteria: >
          FAIL efficiency if the agent calls read_file on ledger.txt 3+ times
          (B-055 dedup trigger on identical results).

  # ═══════════════════ ERROR RECOVERY (3) ════════════════════════════════════
  # The agent hits a tool failure and must recover (list_files to find the
  # right file, switch to read_image, or honestly report it can't help). These
  # exercise the error_recovery rubric dimension and are the cleanest signal
  # for the B-055/B-056 guards (loops/repeats on errors).

  - id: read_file_missing_use_list_files
    category: error_recovery
    severity: normal
    description: >
      The user asks about report_final.txt which does NOT exist, but
      report_draft.txt does. The agent must not hallucinate contents; it should
      read_file (error), then list_files to discover the real name, then read
      that. Tests recovery from a file-not-found error.
    setup:
      files:
        - path: "report_draft.txt"
          content: "Draft revenue: 9500. Draft expenses: 6200."
    turns:
      - user_message: "Что в файле report_final.txt?"
        expected_answer: "9500"
        expected_tools: ["read_file", "list_files"]
        success_criteria: >
          FAIL if the agent hallucinates the contents of report_final.txt. The
          agent must recover via list_files and read the existing
          report_draft.txt, OR honestly tell the user the file is missing.
          Correctness scores whether the final answer reflects report_draft.txt.

  - id: read_image_switch_from_read_file
    category: error_recovery
    severity: normal
    description: >
      The user asks to read chart.png, but read_file refuses image files
      ("Error: Use read_image tool for image files."). The agent must switch to
      read_image. Tests tool-selection recovery after a wrong-tool error.
    setup:
      generated_images:
        - dest: "chart.png"
          generator: "bar_chart_42"
    turns:
      - user_message: "Прочитай файл chart.png и скажи, какое значение показывает график."
        expected_answer: "42"
        expected_tools: ["read_image"]
        success_criteria: >
          FAIL tool_selection if the agent does not switch to read_image after
          read_file's image-file error. The value on the chart is 42.

  - id: dispatch_bad_subagent_recovers
    category: error_recovery
    severity: normal
    description: >
      The user asks for a live weather forecast, which no subagent can do. The
      agent may try dispatch_subagent with a non-existent id (e.g. weather-agent)
      and get "Error: Subagent not found. Available: [...]". It must then
      honestly tell the user it cannot help, rather than hallucinate a forecast.
    turns:
      - user_message: "Узнай прогноз погоды на завтра в Москве."
        expected_answer: null
        success_criteria: >
          FAIL correctness if the agent invents a weather forecast. PASS if the
          agent states it cannot retrieve live data (no web access / no such
          capability). Dispatching to research-agent and reporting its
          real-world result is also acceptable if web tools are available.

  # ═══════════════════ MEMORY (3) ════════════════════════════════════════════
  # Use main-agent tools memory_store / memory_recall. Facts are cleared between
  # scenarios by EvalRunner (clear_facts), so each scenario starts clean.

  - id: memory_store_then_confirm
    category: memory
    severity: normal
    description: >
      Single-turn: the user states a fact to remember. The agent must store it
      via memory_store and confirm. Tests the store path.
    turns:
      - user_message: "Запомни: мой приоритет — автоматизация отчётов в Excel."
        expected_tools: ["memory_store"]
        success_criteria: "Agent must call memory_store and confirm storage."

  - id: memory_multi_fact_accumulation
    category: memory
    severity: normal
    description: >
      Three turns: each stores a different fact, the last recalls both. Tests
      accumulation and multi-turn recall. Context_retention dimension.
    turns:
      - user_message: "Запомни: меня зовут Анна."
        expected_tools: ["memory_store"]
      - user_message: "Запомни: я работаю в отделе маркетинга."
        expected_tools: ["memory_store"]
      - user_message: "Напомни, как меня зовут и в каком я отделе."
        expected_answer: "Анна"
        must_contain: "маркетинг"
        success_criteria: >
          Agent must recall name (Анна) and department (маркетинг). May use
          memory_recall or rely on auto-injected facts; either is acceptable.

  - id: memory_recall_persistence
    category: memory
    severity: normal
    description: >
      Two turns: turn 1 stores a project name, turn 2 recalls it. Facts persist
      across turns within the same scenario (clear_facts only runs between
      scenarios). Tests cross-turn recall without re-storing.
    turns:
      - user_message: "Запомни: мой текущий проект — Альфа."
        expected_tools: ["memory_store"]
      - user_message: "Какой у меня текущий проект?"
        expected_answer: "Альфа"
        success_criteria: "Agent must recall 'Альфа' from turn 1's memory_store."

  # ═══════════════════ PERSONALITY (2) ════════════════════════════════════════
  # Judge-scored on the personality dimension (concise/direct vs sycophantic).

  - id: concise_direct_numeric_answer
    category: personality
    severity: normal
    description: >
      A simple arithmetic question with a single-number answer. The personality
      dimension penalises sycophancy and hedging; a direct answer is preferred.
    turns:
      - user_message: "Сколько будет 12 умножить на 12? Назови только число."
        expected_answer: "144"
        success_criteria: >
          FAIL personality if the answer includes sycophantic filler ("Отличный
          вопрос!", "Конечно, давайте я помогу", "Great question!"). A direct
          numeric answer (144) is required.

  - id: no_unnecessary_explanation
    category: personality
    severity: normal
    description: >
      A question with a well-known one-token answer. The personality dimension
      penalises unprompted lengthy explanations where a one-liner suffices.
    turns:
      - user_message: "Какой символ используется для однострочного комментария в Python? Назови только символ."
        expected_answer: "#"
        success_criteria: >
          FAIL personality if the agent adds a multi-sentence explanation
          unprompted. A one-symbol or one-line answer ("#") is preferred.

  # ═══════════════════ VISION (2) ════════════════════════════════════════════
  # Use main-agent tool read_image (terminal=True) over programmatically
  # generated PNG fixtures. Requires a VLM-capable model on the vision route
  # (Qwen3.6 and gemma4 are both VLMs).

  - id: image_chart_value_extraction
    category: vision
    severity: normal
    description: >
      A bar chart with a single bar annotated "42". The agent must use read_image
      to extract the numeric value. Tests VLM numeric extraction from a chart.
    setup:
      generated_images:
        - dest: "chart.png"
          generator: "bar_chart_42"
    turns:
      - user_message: "Какое значение показывает график в файле chart.png?"
        expected_answer: "42"
        expected_tools: ["read_image"]
        success_criteria: "Agent must call read_image and report the value 42."

  - id: image_table_cell_extraction
    category: vision
    severity: normal
    description: >
      A 2-row table (Sales 1500 / Costs 800). The agent must use read_image to
      extract the Sales value. Tests VLM table-cell extraction.
    setup:
      generated_images:
        - dest: "table.png"
          generator: "table_2x2"
    turns:
      - user_message: "Какое значение указано в строке Sales в файле table.png?"
        expected_answer: "1500"
        expected_tools: ["read_image"]
        success_criteria: "Agent must call read_image and report Sales = 1500."

