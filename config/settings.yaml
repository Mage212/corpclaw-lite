# CorpClaw Lite — Main Configuration
#
# Secrets and API keys are injected via ${VAR:-default} from .env / environment.
# To add a new LLM provider: add it to llm.named and optionally a routing rule.
# To change routing: edit llm.routing — no code changes needed.
#
# Provider types:
#   openai    — OpenAI-compatible: Ollama, vLLM, LM Studio, OpenRouter, etc.
#   anthropic — native Anthropic SDK (supports base_url for proxies/gateways)

llm:
  # Name of the default named provider (used when no routing rule matches)
  default: "default"

  # Named providers — add as many as you need
  named:
    # Primary provider: resolves to whatever is set in .env
    default:
      type: "openai"
      # model: "stepfun/step-3.5-flash:free"
      # model: "lfm2.5-1.2b-thinking"
      model: "qwen3.5-4b@q4_k_m"
      base_url: "${OPENAI_BASE_URL:-http://localhost:11434/v1}"
      api_key: "${OPENAI_API_KEY:-ollama}"
      preset: "qwen3-thinking"

    # Vision provider: same base by default, override to use a dedicated vision model
    vision:
      type: "openai"
      model: "qwen3.5-4b@q4_k_m"
      base_url: "${OPENAI_BASE_URL:-http://localhost:11434/v1}"
      api_key: "${OPENAI_API_KEY:-ollama}"
      preset: "qwen3-no-think"

    # Cloud provider for calibration analysis and heavy tasks.
    # Option A: Anthropic Claude (requires ANTHROPIC_API_KEY in .env)
    cloud:
      type: "anthropic"
      model: "claude-sonnet-4-20250514"
      api_key: "${ANTHROPIC_API_KEY:-}"
      base_url: "${ANTHROPIC_BASE_URL:-}"

    # Option B: OpenAI-compatible cloud (OpenRouter, DeepSeek, etc.)
    # Uncomment and set as 'cloud' or use --cloud-provider cloud-openai
    # cloud-openai:
    #   type: "openai"
    #   model: "deepseek/deepseek-chat-v3-0324:free"
    #   base_url: "https://openrouter.ai/api/v1"
    #   api_key: "${OPENROUTER_API_KEY:-}"

  # Routing rules — checked top-to-bottom, first match wins
  # task_kind and subagent_id are optional; both may be set for specificity
  routing:
    # Vision tasks routed to the dedicated vision provider
    - task_kind: "vision"
      provider: "vision"

    # Memory consolidation uses the default provider (light summarisation)
    - task_kind: "consolidate"
      provider: "default"

    # Example: route a specific subagent to the cloud provider
    # - subagent_id: "heavy-analysis-agent"
    #   provider: "cloud"

agent:
  max_steps: 15
  max_tool_calls: 30
  max_wall_time_ms: 120000
  max_history: 20
  approval_mode: "manual"
  consolidation_enabled: true
  consolidation_threshold: 30
  compression:
    enabled: true
    max_context_tokens: 8000
    threshold_ratio: 0.5
    protect_tail_tokens: 3000

# Container isolation — per-user Docker sandboxes
# Set enabled: false for local development without Docker
container:
  enabled: true
  image: "corpclaw-agent-base:latest"
  workspace_base: "${WORKSPACE_BASE:-workspaces}"
  max_memory: "512m"
  cpus: 0.5
  idle_timeout_seconds: 600

telegram:
  rate_limit_per_minute: 10
  default_department: "default"

# Logging — file rotation + structured activity log
# Set level to "INFO" to reduce verbosity in production
# Set log_dir to an absolute path or relative to project root
logging:
  level: "DEBUG"           # corpclaw.log — detailed trace for debugging
  console_level: "INFO"    # stdout/stderr — clean output for operators
  log_dir: "${LOG_DIR:-logs}"
