# CorpClaw Lite — Main Configuration
#
# Providers are registered via PROVIDER_* env vars in .env.
# This file defines routing: which provider + model to use for each task.
#
# To add a new provider: add PROVIDER_<NAME>__* vars in .env, then add routing below.
# To change routing: edit llm.routing — no code changes needed.

llm:
  # Max concurrent LLM inference requests (match GPU inference slots)
  max_concurrent_requests: 2
  # Request queue — backpressure + user notifications
  queue:
    enabled: true
    notify_position: true
    notify_interval_seconds: 30
  # Routing rules — checked top-to-bottom, first match wins
  # provider: must match a name registered via PROVIDER_* env vars in .env
  # model:    model identifier for that provider
  # preset:   (optional) model preset from config/model_presets.yaml
  routing:
    # Main chat (used by AgentLoop)
    - task_kind: "default"
      provider: "litellm"
      model: "qwen3.5-9b"
      preset: "temperature-0.4"

    # Vision analysis (separate LLM call for images)
    - task_kind: "vision"
      provider: "litellm"
      model: "qwen3.5-9b"

    # Memory consolidation (LLM-based history compression)
    - task_kind: "consolidate"
      provider: "litellm"
      model: "qwen3.5-4b"

    # Context compression (LLM-based summary of old turns)
    - task_kind: "compress"
      provider: "litellm"
      model: "qwen3.5-4b"

    # Calibration analysis (cloud provider recommended)
    # Uncomment and configure PROVIDER_OPENROUTER__* in .env to enable
    # - task_kind: "calibration"
    #   provider: "openrouter"
    #   model: "anthropic/claude-sonnet-4-20250514"

    # Per-subagent routing (optional — falls back to default if no rule matches)
    # - subagent_id: "research-agent"
    #   provider: "openrouter"
    #   model: "deepseek/deepseek-chat-v3-0324"

agent:
  max_steps: 15
  max_tool_calls: 30
  max_wall_time_ms: 300000
  max_history: 20
  approval_mode: "manual"
  consolidation_enabled: true
  consolidation_threshold: 50
  compression:
    enabled: true
    max_context_tokens: 64000
    # Trigger compression only at 80% capacity
    threshold_ratio: 0.8
    protect_tail_tokens: 3000
    summary_ratio: 0.20
    prune_min_messages: 15

container:
  enabled: true
  image: "corpclaw-agent-base:latest"
  workspace_base: "workspaces"
  max_memory: "512m"
  cpus: 0.5
  idle_timeout_seconds: 600
  max_per_user: 1
  strict_capabilities: false
  ipc_timeout_seconds: 120.0

telegram:
  workspace_base: "workspaces"
  rate_limit_per_minute: 10
  whitelist: []
  default_department: "default"
  admin_ids: []

  # Fallback transport — manual IP overrides (empty = DoH auto-discovery)
  # When api.telegram.org is unreachable, requests are retried via these IPs
  # with preserved TLS SNI. Set manually or leave empty for auto-discovery.
  fallback_ips: []

  # HTTP timeouts (seconds) — passed to python-telegram-bot's HTTPXRequest
  connect_timeout: 10.0
  read_timeout: 20.0
  pool_timeout: 8.0

  # Connection resilience — retries for transient failures
  init_max_retries: 8       # app.initialize() attempts (exp backoff up to 15s)
  network_max_retries: 10   # Runtime network error retries (exp backoff 5-60s)
  conflict_max_retries: 3   # Runtime 409 Conflict retries (10s fixed delay)

skills:
  selection_mode: "semantic"
  top_k: 3
  tfidf_threshold: 0.08
  keyword_boost: 0.5

logging:
  level: "DEBUG"
  console_level: "INFO"
  log_dir: "logs"
  health_port: 8080
  trace_enabled: true
  trace_level: "metadata"
  trace_preview_chars: 200
