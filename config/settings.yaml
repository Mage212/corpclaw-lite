# CorpClaw Lite — Main Configuration
#
# Providers are registered via PROVIDER_* env vars in .env.
# This file defines routing: which provider + model to use for each task.
#
# To add a new provider: add PROVIDER_<NAME>__* vars in .env, then add routing below.
# To change routing: edit llm.routing — no code changes needed.

llm:
  # Max concurrent LLM inference requests (match GPU inference slots)
  max_concurrent_requests: 4
  # Request queue — backpressure + user notifications
  queue:
    enabled: true
    strategy: "slot_affinity"
    notify_position: true
    notify_interval_seconds: 30
    slot_affinity:
      enabled: true
      backend: "llama_cpp"
      provider_names: ["llamacpp"]
      sticky_slot_ids: [0, 1, 2]
      overflow_slot_ids: [3]
      idle_ttl_seconds: 120.0
      cache_prompt: true
      auxiliary_policy: "overflow_only"
    persistent_cache:
      enabled: false
      # Must point to the same directory llama-server uses for --slot-save-path
      # when CorpClaw is expected to prune files directly. Save/restore still
      # works through the llama-server API when this path is not locally mounted.
      root_dir: "data/llm_cache/slot-cache"
      index_path: "data/llm_cache/index.sqlite"
      slot_api_base_url: null
      max_total_bytes: 107374182400
      max_age_days: 30
      save_policy: "hybrid"
      save_min_tokens: 1024
      save_dirty_seconds: 60.0
      validation_min_reuse_ratio: 0.70
      validation_large_context_tokens: 16000
      validation_large_reuse_ratio: 0.90
      strict_mismatch_retry: true
      prune_interval_seconds: 600.0
      http_timeout_seconds: 30.0
  # Routing rules — checked top-to-bottom, first match wins
  # provider:       must match a name registered via PROVIDER_* env vars in .env
  # model:          model identifier for that provider
  # sampling:       (preferred) sampling profile from config/model_presets.yaml
  #                 (the ``sampling:`` block). Controls thinking_mode + per-task
  #                 inference overrides. See D-056.
  # model_profile:  (optional) override the model profile; inferred from the
  #                 sampling profile's ``model:`` or the rule's ``model:`` if absent.
  # preset:         (deprecated) legacy combined preset — still works via the
  #                 back-compat reader. Prefer ``sampling:``.
  routing:
    # Main chat (used by AgentLoop) — gemma4 with its model-scoped sampling.
    # NOTE: sampling profile MUST match the route's model. The router detects
    # mismatches and warns + skips inference_overrides (thinking_mode preserved).
    - task_kind: "default"
      provider: "llamacpp"
      model: "gemma4-26b-qat"
      sampling: "gemma4-default"

    # Vision analysis (separate LLM call for images) — thinking off (extraction)
    - task_kind: "vision"
      provider: "llamacpp"
      model: "gemma4-26b-qat"
      sampling: "gemma4-fast"

    # Memory consolidation (LLM-based history compression) — thinking off
    - task_kind: "consolidate"
      provider: "llamacpp"
      model: "gemma4-26b-qat"
      sampling: "gemma4-fast"

    # Context compression (LLM-based summary of old turns) — thinking off
    - task_kind: "compress"
      provider: "llamacpp"
      model: "gemma4-26b-qat"
      sampling: "gemma4-fast"

    # Calibration analysis (cloud provider recommended)
    # Uncomment and configure PROVIDER_OPENROUTER__* in .env to enable
    # - task_kind: "calibration"
    #   provider: "openrouter"
    #   model: "anthropic/claude-sonnet-4-20250514"

    # Eval judge (B-060): cloud model that scores agent answers against the
    # 7-dimension rubric. The agent-under-test stays on the `default` route
    # (local LLM); only the judge uses this. Requires PROVIDER_CLOUD__* env vars
    # (e.g. z.ai glm-5.2). When the cloud provider is not registered, the judge
    # resolves to None and the eval falls back to deterministic-only scoring.
    - task_kind: "eval"
      provider: "cloud"
      model: "glm-5.2"

    # Per-subagent routing (optional — falls back to default if no rule matches)
    # - subagent_id: "research-agent"
    #   provider: "openrouter"
    #   model: "deepseek/deepseek-chat-v3-0324"

agent:
  max_steps: 30
  max_tool_calls: 60
  max_wall_time_ms: 300000
  max_history: 20
  approval_mode: "manual"
  consolidation_enabled: true
  consolidation_threshold: 50
  llm_streaming_enabled: true
  llm_stream_stall_seconds: 20.0
  llm_stream_max_reasoning_chars: 12000
  llm_stream_status_updates: true
  vision_max_image_bytes: 10485760
  compression:
    enabled: true
    max_context_tokens: 64000
    # Trigger compression only at 80% capacity
    threshold_ratio: 0.8
    protect_tail_tokens: 3000
    summary_ratio: 0.20
    prune_min_messages: 15
  # D-056 PR2: per-call thinking overrides based on task phase. The policy is
  # enabled by default but is a NO-OP for the main agent in its default phase
  # (no override returned), so it only takes effect in closing mode (budget
  # pressure) and for workflow subagents (research). Set enabled: false to
  # disable entirely.
  phase_policy:
    enabled: true
    # Semantic primary signal: tool names whose presence in the PREVIOUS turn
    # marks the aggregation/finalization phase (about to write the final report).
    aggregation_markers: ["research_list_facts"]
    # Semantic signal: tool names whose presence in the previous turn marks the
    # gathering phase (still collecting raw material).
    gathering_tools:
      - research_search
      - research_fetch_source
      - research_read_source
      - research_list_sources
      - research_store_fact
    # Per-phase thinking overrides (default | off | budget).
    closing_thinking: "off"          # main agent budget < soft_deadline_ratio
    gathering_thinking: "off"        # research gathering (incl. first turn)
    aggregation_thinking: "default"  # research aggregation (final analysis/report)

web:
  search_backend: "auto"
  search_retry_attempts: 3
  search_retry_backoff_seconds: 1.5
  search_max_concurrent: 1
  fetch_max_concurrent: 4
  timeout_seconds: 20
  user_agent: "CorpClawLite/0.1 web tools"

web_channel:
  host: "127.0.0.1"
  port: 8090
  workspace_base: "workspaces"
  upload_max_bytes: 20971520
  rate_limit_per_minute: 10
  login_rate_limit_per_minute: 5
  login_lockout_threshold: 5
  login_lockout_seconds: 300
  password_min_length: 12
  password_max_length: 256
  session_ttl_hours: 12
  cookie_name: "corpclaw_lite_session"
  cookie_secure: "auto"
  ws_ticket_ttl_seconds: 30
  chat_active_max_messages: 2000
  chat_archived_session_ttl_days: 30
  chat_max_archived_sessions_per_user: 20

research:
  cache_ttl_hours: 24
  normal_max_sources: 5
  deep_max_sources: 10
  normal_search_waves: 1
  deep_search_waves: 3
  normal_max_rereads: 0
  deep_max_rereads: 10
  source_excerpt_chars: 6000
  # Enforce research_finalize validation (language grounding, source integrity,
  # list_facts mandate, count assertions). Soft mode (false) only warns + traces.
  finalize_strict: false

container:
  enabled: true
  image: "corpclaw-agent-base:latest"
  workspace_base: "workspaces"
  max_memory: "512m"
  cpus: 0.5
  idle_timeout_seconds: 600
  max_per_user: 1
  strict_capabilities: false
  ipc_timeout_seconds: 120.0

telegram:
  workspace_base: "workspaces"
  rate_limit_per_minute: 10
  whitelist: []
  default_department: "default"
  admin_ids: []

  # Fallback transport — manual IP overrides (empty = DoH auto-discovery)
  # When api.telegram.org is unreachable, requests are retried via these IPs
  # with preserved TLS SNI. Set manually or leave empty for auto-discovery.
  fallback_ips: []

  # HTTP timeouts (seconds) — passed to python-telegram-bot's HTTPXRequest
  connect_timeout: 10.0
  read_timeout: 20.0
  pool_timeout: 8.0

  # Connection resilience — retries for transient failures
  init_max_retries: 8       # app.initialize() attempts (exp backoff up to 15s)
  network_max_retries: 10   # Runtime network error retries (exp backoff 5-60s)
  conflict_max_retries: 3   # Runtime 409 Conflict retries (10s fixed delay)

skills:
  selection_mode: "semantic"
  top_k: 3
  tfidf_threshold: 0.08
  keyword_boost: 0.5

# Extra overlay directories for private extensions (mirror-layout).
# Each path must mirror the project structure:
#   <path>/skills/, <path>/plugins/, <path>/config/subagents/,
#   <path>/config/bootstrap/, <path>/config/mcp_servers.yaml
# Used for private/corporate extensions that must not enter the public repo.
# Env interpolation supported, e.g. "${CORPCLAW_PRIVATE_EXTENSIONS}".
# Empty/unset entries and non-existent paths are skipped by resolve_dirs.
extensions:
  extra_paths: []

logging:
  level: "DEBUG"
  console_level: "INFO"
  log_dir: "logs"
  health_port: 8080
  trace_enabled: true
  trace_level: "metadata"
  trace_preview_chars: 200
  # D-056 post-0.2.0: raw LLM request/response capture (opt-in, OFF by default).
  # When enabled, writes logs/llm_payloads.jsonl with one record per LLM call,
  # filtered by capture_fields (allowlist). Used for diagnostics (what the model
  # actually receives/returns) and future fine-tuning dataset collection.
  # Credentials are scrubbed (sk-*, Bearer, etc.) — but review capture_fields
  # before enabling in privacy-sensitive deployments.
  capture_enabled: false
  capture_fields:
    - "request.model"           # model name
    - "request.messages"        # full messages array (system + user + history)
    - "request.tools"           # full tools schema
    - "request.params"          # temperature/top_p/max_tokens/seed/...
    - "request.extra_body"      # chat_template_kwargs, id_slot, cache_prompt, top_k...
    - "response.content"        # raw content (pre-XML-parse)
    - "response.reasoning"      # raw reasoning_content
    - "response.tool_calls"     # parsed tool_calls
    - "response.usage"          # token counts + backend timings
    - "response.finish_reason"  # stop | tool_calls | length | ...
  capture_dir: "logs"

