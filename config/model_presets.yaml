# Model Presets — ModelProfile (model properties) + SamplingProfile (task properties)
#
# Split D-056: each model gets a canonical ModelProfile with OFFICIAL inference
# parameters from the manufacturer. SamplingProfiles are **model-scoped** — each
# sampling profile declares `model:` and its `inference_overrides` apply ONLY when
# the route's model matches. A mismatch (e.g. a qwen sampling on a gemma4 route)
# is detected by the router at load time → warn + skip inference_overrides
# (thinking_mode preserved). This prevents silent cross-model parameter leakage
# that breaks models (e.g. qwen's temperature=0.4 made gemma4 non-deterministically
# crash at thinking-OFF).
#
# Admins/testers can still override per-call via RequestOptions (model-agnostic
# by design — explicit override, highest priority).
#
# Source of canonical parameters:
#   Gemma 4 — official Google recommendation (single set for all modes).
#   Qwen 3  — official recommendation, 4 task-specific modes.

models:
  # ── Qwen 3 (35B A3B) ──────────────────────────────────────────────────────
  # Native reasoning_content (Qwen3-style). Default inference = "Thinking mode
  # for general tasks" (official rec). Task-specific overrides live in the
  # qwen-* sampling profiles below.
  qwen3.6-35b-a3b:
    description: "Qwen 3 35B A3B with native reasoning_content"
    thinking_parser:
      source: "native"
    default_inference:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0

  # ── Gemma 4 (26B QAT) ─────────────────────────────────────────────────────
  # Native reasoning_content. Official rec: temperature=1.0, top_p=0.95, top_k=64
  # (single set for all modes). DO NOT lower temperature below ~0.7: gemma4
  # becomes non-deterministically unstable at thinking-OFF (degenerate output).
  gemma4-26b-qat:
    description: "Gemma 4 26B QAT with native reasoning_content"
    thinking_parser:
      source: "native"
    default_inference:
      temperature: 1.0
      top_p: 0.95
      top_k: 64

sampling:
  # ── Gemma 4 (single recommendation for all modes) ─────────────────────────
  gemma4-default:
    description: "Gemma 4 natural thinking (official rec)"
    model: gemma4-26b-qat
    thinking_mode: default

  gemma4-fast:
    description: "Gemma 4 without thinking — fast mode"
    model: gemma4-26b-qat
    thinking_mode: off

  # ── Qwen 3 (4 canonical modes per official recommendation) ────────────────
  qwen-thinking-general:
    description: "Qwen3 thinking mode, general tasks"
    model: qwen3.6-35b-a3b
    thinking_mode: default
    inference_overrides:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0

  qwen-thinking-coding:
    description: "Qwen3 thinking mode, precise coding tasks"
    model: qwen3.6-35b-a3b
    thinking_mode: default
    inference_overrides:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 0.0
      repetition_penalty: 1.0

  qwen-instruct-general:
    description: "Qwen3 instruct (no-thinking) mode, general tasks"
    model: qwen3.6-35b-a3b
    thinking_mode: off
    inference_overrides:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0

  qwen-instruct-reasoning:
    description: "Qwen3 instruct (no-thinking) mode, reasoning tasks"
    model: qwen3.6-35b-a3b
    thinking_mode: off
    inference_overrides:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0

  # ── Auxiliary: thinking off for extraction / summarization ──────────────
  # Used by vision / compress / consolidate routes (when on qwen) — extraction
  # does not need reasoning, only speed. Low temperature for deterministic output.
  aux-no-thinking:
    model: qwen3.6-35b-a3b
    thinking_mode: off
    inference_overrides:
      temperature: 0.2
