# CorpClaw Lite — Model Profiles + Sampling Profiles
#
# Split (D-056) of the legacy combined ``presets:`` into two orthogonal layers:
#
#   models:     ModelProfile — properties of a *model* (thinking parser,
#                system_prompt_prefix, default_inference). Bound to a model id,
#                rarely changes. Corresponds to the model-bound half of the old
#                combined preset.
#
#   sampling:   SamplingProfile — properties of a *task / phase* (thinking_mode
#                default|off|budget, thinking_budget, inference_overrides).
#                Changes freely, references a ModelProfile by ``model:`` name.
#                Corresponds to the task-bound half of the old preset.
#
# Reference a sampling profile by name in config/settings.yaml routing rules:
#
#   llm:
#     routing:
#       - task_kind: "default"
#         provider: "llamacpp"
#         model: "qwen3.6-35b-a3b"
#         sampling: "temperature-0.4"   # ← uses this sampling profile
#
# Legacy combined format (``presets:``) is still parsed by the back-compat
# reader in src/corpclaw_lite/llm/presets.py, so overlays and un-migrated
# config keep working. New deployments should use the split format below.

models:
  # ── Qwen 3.6 (35B A3B MoE) ──────────────────────────────────────────────
  qwen3.6-35b-a3b:
    description: "Qwen3.6-35B-A3B with native reasoning_content field"
    thinking_parser:
      source: "native"
    default_inference:
      temperature: 0.7
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      # SAFETY (from LM Studio docs): repeat_penalty penalizes OUTPUT-only
      # repetitions — safe for tool calling. presence_penalty penalizes INPUT
      # tokens (prompt + tool schemas) and KILLS tool name generation — never
      # use it with tool calling.
      repeat_penalty: 1.1

  # ── Gemma 4 (26B QAT) ────────────────────────────────────────────────────
  gemma4-26b-qat:
    description: "Gemma 4 with extended thinking via <|think|> tag injection"
    system_prompt_prefix: "<|think|>"
    thinking_parser:
      open_tag: "<|channel>thought"
      close_tag: "<channel|>"
      source: "content"
    default_inference:
      temperature: 0.7
      top_p: 0.9
      top_k: 64

sampling:
  # ── Default (natural thinking, model's inference defaults) ───────────────
  qwen3.6-default:
    model: qwen3.6-35b-a3b
    thinking_mode: default

  gemma4-default:
    description: "Gemma 4 natural thinking"
    model: gemma4-26b-qat
    thinking_mode: default
    inference_overrides:
      temperature: 1.0

  gemma4-fast:
    description: "Gemma 4 without thinking — fast mode"
    model: gemma4-26b-qat
    thinking_mode: off
    inference_overrides:
      temperature: 0.7
      top_p: 0.9

  # ── Auxiliary: thinking off for extraction / summarization ──────────────
  # Used by vision / compress / consolidate routes — these calls do not need
  # reasoning, only extraction, so thinking is disabled for speed.
  aux-no-thinking:
    model: qwen3.6-35b-a3b
    thinking_mode: off
    inference_overrides:
      temperature: 0.2

  # ── Temperature-only overrides (equivalents of the old single-param presets) ──
  temperature-0.4:
    model: qwen3.6-35b-a3b
    thinking_mode: default
    inference_overrides:
      temperature: 0.4

  # ── Thinking-budget capped (soft cap, model-dependent effectiveness) ─────
  # Example: cap reasoning output at N tokens. Uncomment and reference via
  # sampling: "qwen3.6-budget-128" to experiment with budgeted thinking.
  # qwen3.6-budget-128:
  #   model: qwen3.6-35b-a3b
  #   thinking_mode: budget
  #   thinking_budget: 128

# ── Structured Output (example for models ≥7B) ─────────────────────────────
#
# LM Studio supports response_format with JSON Schema (same as OpenAI Structured
# Output). The model will only generate valid JSON conforming to the provided
# schema. NOT COMPATIBLE with tool calling in the same request.
#
# structured-extraction:
#   model: qwen3.6-35b-a3b
#   thinking_mode: off
#   inference_overrides:
#     temperature: 0.3                    # low temp for deterministic output
#     top_p: 0.9
#     response_format:                    # OpenAI-compatible standard param
#       type: "json_schema"
#       json_schema:
#         name: "extraction_result"
#         strict: true
#         schema:
#           type: "object"
#           properties:
#             entities:
#               type: "array"
#               items:
#                 type: "object"
#                 properties:
#                   name: { type: "string" }
#                   type: { type: "string", enum: ["person", "org", "location"] }
#                 required: ["name", "type"]
#           required: ["entities"]
