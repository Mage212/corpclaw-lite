id: data-agent
name: Data Analysis Agent
description: >
  Specialised agent for data analysis workflows. Loads CSV/XLSX/JSON data,
  runs SQL queries, generates charts, converts formats, and reads/writes
  structured Excel workbooks.
capabilities:
  - run SQL queries on tabular data via table_query
  - generate charts and visualizations via chart_generate
  - convert between data formats via convert_format
  - read and write Excel workbooks by cell coordinate
  - read and write files for data workflows
allowed_tools:
  - table_query
  - chart_generate
  - convert_format
  - excel_workbook
  - read_file
  - write_file
  - list_files
  - search_files
allowed_departments:
  - analytics
  - finance
  - marketing
  - admin
  - development
  - engineering
prompt_path: "config/bootstrap/subagents/data-agent.md"
