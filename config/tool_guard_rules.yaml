rules:
  # Blocking dangerous system removals (covers rm -rf, rm -r -f, rm -fr, etc.)
  - id: DANGEROUS_RM
    description: "Attempting to run destructive rm command."
    tool: "exec_script"
    severity: CRITICAL
    match_param: "script"
    match_pattern: "rm\\s+(-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*|(-[a-zA-Z]*f[a-zA-Z]*\\s+-[a-zA-Z]*r|-[a-zA-Z]*r[a-zA-Z]*\\s+-[a-zA-Z]*f)|--recursive|--force)"
    require_approval: false

  # Preventing directory traversal attacks — read_file
  - id: PATH_TRAVERSAL_READ
    description: "Path traversal detected in read_file."
    tool: "read_file"
    severity: HIGH
    match_param: "path"
    match_pattern: "\\.\\./"
    require_approval: true

  # Preventing directory traversal attacks — write_file
  - id: PATH_TRAVERSAL_WRITE
    description: "Path traversal detected in write_file."
    tool: "write_file"
    severity: HIGH
    match_param: "path"
    match_pattern: "\\.\\./"
    require_approval: true

  # Preventing directory traversal attacks — edit_file
  - id: PATH_TRAVERSAL_EDIT
    description: "Path traversal detected in edit_file."
    tool: "edit_file"
    severity: HIGH
    match_param: "path"
    match_pattern: "\\.\\./"
    require_approval: true

  # Detecting secrets passed in script arguments
  - id: SECRET_IN_SCRIPT
    description: "Potential secret API key passed in script argument."
    tool: "*"
    severity: HIGH
    match_param: "script"
    match_pattern: "(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{20,})"
    require_approval: true

  # Detecting secrets passed in content arguments
  - id: SECRET_IN_CONTENT
    description: "Potential secret API key passed in content argument."
    tool: "*"
    severity: HIGH
    match_param: "content"
    match_pattern: "(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{20,})"
    require_approval: true

  # Detecting secrets passed in value arguments
  - id: SECRET_IN_VALUE
    description: "Potential secret API key passed in value argument."
    tool: "*"
    severity: HIGH
    match_param: "value"
    match_pattern: "(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{20,})"
    require_approval: true

  # ── exec_script extended rules ──────────────────────────────────────

  - id: DANGEROUS_SHUTIL_RMTREE
    description: "Attempting to destroy directory tree via Python"
    tool: "exec_script"
    severity: CRITICAL
    match_param: "script"
    match_pattern: "shutil\\.rmtree"
    require_approval: false

  - id: DANGEROUS_PIPE_TO_SHELL
    description: "Pipe to shell execution pattern"
    tool: "exec_script"
    severity: HIGH
    match_param: "script"
    match_pattern: "(curl\\s.*\\|\\s*(ba)?sh|wget\\s.*\\|\\s*(ba)?sh)"
    require_approval: true

  - id: CHMOD_777
    description: "Setting overly permissive file permissions"
    tool: "exec_script"
    severity: MEDIUM
    match_param: "script"
    match_pattern: "chmod\\s+(.*\\s)?777"
    require_approval: true

  - id: DANGEROUS_DD
    description: "Raw disk/device write via dd"
    tool: "exec_script"
    severity: CRITICAL
    match_param: "script"
    match_pattern: "dd\\s+.*of=/dev/"
    require_approval: false

  # ── web_fetch SSRF protection ──────────────────────────────────────

  - id: WEB_FETCH_PRIVATE_IP
    description: "Fetching internal/private network addresses"
    tool: "web_fetch"
    severity: HIGH
    match_param: "url"
    match_pattern: "(127\\.|10\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.|192\\.168\\.|localhost|0\\.0\\.0\\.0)"
    require_approval: true

  - id: WEB_FETCH_SENSITIVE_PATHS
    description: "Fetching sensitive local paths"
    tool: "web_fetch"
    severity: MEDIUM
    match_param: "url"
    match_pattern: "(file://|metadata\\.google\\.internal)"
    require_approval: true

  - id: WEB_SEARCH_INTERNAL_TARGETS
    description: "Searching for internal/private network targets"
    tool: "web_search"
    severity: MEDIUM
    match_param: "query"
    match_pattern: "(127\\.|10\\.|172\\.(1[6-9]|2[0-9]|3[01])\\.|192\\.168\\.|localhost|0\\.0\\.0\\.0|169\\.254\\.|metadata\\.google\\.internal)"
    require_approval: true

  # ── Absolute path protection (defense-in-depth; code-level validation is primary) ──

  - id: ABS_PATH_READ
    description: "Absolute path to sensitive system directory in read_file"
    tool: "read_file"
    severity: HIGH
    match_param: "path"
    match_pattern: "^/(etc|proc|sys|dev|root|home|var/log|boot)"
    require_approval: true

  - id: ABS_PATH_WRITE
    description: "Absolute path to sensitive system directory in write_file"
    tool: "write_file"
    severity: CRITICAL
    match_param: "path"
    match_pattern: "^/(etc|proc|sys|dev|root|home|var/log|boot)"
    require_approval: false

  - id: ABS_PATH_EDIT
    description: "Absolute path to sensitive system directory in edit_file"
    tool: "edit_file"
    severity: CRITICAL
    match_param: "path"
    match_pattern: "^/(etc|proc|sys|dev|root|home|var/log|boot)"
    require_approval: false

  # ── New data tools: path traversal + absolute path protection ────────

  - id: PATH_TRAVERSAL_TABLE_QUERY
    description: "Path traversal detected in table_query"
    tool: "table_query"
    severity: HIGH
    match_param: "path"
    match_pattern: "\\.\\./"
    require_approval: true

  - id: ABS_PATH_TABLE_QUERY
    description: "Absolute path to sensitive directory in table_query"
    tool: "table_query"
    severity: HIGH
    match_param: "path"
    match_pattern: "^/(etc|proc|sys|dev|root|home|var/log|boot)"
    require_approval: true

  - id: PATH_TRAVERSAL_CHART_GENERATE
    description: "Path traversal detected in chart_generate"
    tool: "chart_generate"
    severity: HIGH
    match_param: "data_path"
    match_pattern: "\\.\\./"
    require_approval: true

  - id: ABS_PATH_CHART_GENERATE
    description: "Absolute path to sensitive directory in chart_generate"
    tool: "chart_generate"
    severity: HIGH
    match_param: "data_path"
    match_pattern: "^/(etc|proc|sys|dev|root|home|var/log|boot)"
    require_approval: true

  - id: PATH_TRAVERSAL_PDF_READER
    description: "Path traversal detected in pdf_reader"
    tool: "pdf_reader"
    severity: HIGH
    match_param: "path"
    match_pattern: "\\.\\./"
    require_approval: true

  - id: ABS_PATH_PDF_READER
    description: "Absolute path to sensitive directory in pdf_reader"
    tool: "pdf_reader"
    severity: HIGH
    match_param: "path"
    match_pattern: "^/(etc|proc|sys|dev|root|home|var/log|boot)"
    require_approval: true

  - id: PATH_TRAVERSAL_CONVERT_FORMAT
    description: "Path traversal detected in convert_format"
    tool: "convert_format"
    severity: HIGH
    match_param: "input_path"
    match_pattern: "\\.\\./"
    require_approval: true

  - id: ABS_PATH_CONVERT_FORMAT
    description: "Absolute path to sensitive directory in convert_format"
    tool: "convert_format"
    severity: HIGH
    match_param: "input_path"
    match_pattern: "^/(etc|proc|sys|dev|root|home|var/log|boot)"
    require_approval: true

  - id: PATH_TRAVERSAL_DIFF_TEXT_SOURCE
    description: "Path traversal detected in diff_text source"
    tool: "diff_text"
    severity: HIGH
    match_param: "source"
    match_pattern: "\\.\\./"
    require_approval: true

  - id: PATH_TRAVERSAL_DIFF_TEXT_TARGET
    description: "Path traversal detected in diff_text target"
    tool: "diff_text"
    severity: HIGH
    match_param: "target"
    match_pattern: "\\.\\./"
    require_approval: true

  # ── table_query: SQL DDL defense-in-depth ─────────────────────────────

  - id: SQL_DDL_TABLE_QUERY
    description: "DDL statement detected in table_query — data modification attempted"
    tool: "table_query"
    severity: MEDIUM
    match_param: "query"
    match_pattern: "(?i)(DROP|ALTER|TRUNCATE|DELETE|INSERT|UPDATE)\\s"
    require_approval: true
