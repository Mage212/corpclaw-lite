# Department definitions and RBAC tool permissions
#
# Each department defines:
#   allowed_tools: tools this department can use (["*"] = all)
#   allowed_subagents: subagents this department can dispatch to
#
# Resource limits (max_steps, max_tool_calls, max_wall_time_ms) are controlled
# globally in config/settings.yaml → agent.*. Department-specific iteration/
# tool-call budgets were removed — they silently overrode settings, causing
# "config change has no effect" bugs (the operator changes settings.yaml but
# the department budget wins). The `budget:` block is still parsed for
# back-compat but no longer applied in the agent loop.
#
# Main agent tools (inspection + routing):
#   read_file, list_files, search_files, excel_inspect
# Host-side tools (registered separately):
#   web_fetch, web_search, read_image, memory_store, memory_recall,
#   dispatch_subagent, send_file
# Subagent-only tools (NOT available to main agent):
#   write_file, edit_file, exec_script, normalize_excel, diff_text,
#   pdf_reader, convert_format, table_query, chart_generate, excel_workbook

departments:
  default:
    description: "Default department for unclassified users"
    allowed_tools:
      - read_file
      - list_files
      - search_files
      - memory_store
      - memory_recall
      - read_image
      - dispatch_subagent
      - excel_inspect
      - web_fetch
      - web_search
      - send_file
    allowed_subagents:
      - research-agent

